<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GeoVPN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root {
      --fg: #c0caf5;
      --border: #414868;
      --muted: #565f89;
      --badge-bg: #1e2030;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #24283b 0, #1a1b26 45%, #15161e 100%);
      color: var(--fg);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .page {
      width: 100%;
      max-width: 960px;
      padding: 24px 16px 40px;
    }

    .card {
      background: rgba(26, 27, 38, 0.96);
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(148, 226, 213, 0.02);
      padding: 24px 20px 20px;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
    }

    .card + .card {
      margin-top: 18px;
    }

    .center {
      text-align: center;
    }

    .typing-banner {
      display: inline-block;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(42, 195, 222, 0.5);
      background: linear-gradient(135deg, rgba(42, 195, 222, 0.12), rgba(187, 154, 247, 0.08));
      padding: 10px 60px;
      margin-bottom: 10px;
      font-family: "Comfortaa", sans-serif;
      font-size: 20pt;
      font-weight: 800;
      color: #00E5FF;
    }

    .title-main {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin: 18px 0 8px;
      background: linear-gradient(120deg, #2ac3de, #7aa2f7, #bb9af7);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 10px;
    }

    .btn-telegram {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 999px;
      border: 1px solid rgba(34, 158, 217, 0.7);
      background: radial-gradient(circle at 0 0, rgba(42, 195, 222, 0.35), rgba(26, 27, 38, 0.95));
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      box-shadow: 0 10px 24px rgba(34, 158, 217, 0.45), 0 0 0 1px rgba(34, 158, 217, 0.25);
      transition: transform 0.12s ease-out, box-shadow 0.12s ease-out, background 0.12s ease-out;
      margin: 10px;
    }

    .btn-telegram:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .btn-telegram span {
      font-size: 15px;
    }

    .badge-row {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--badge-bg);
      border: 1px solid rgba(65, 72, 104, 0.9);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .guides-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin: 0 auto 10px;
      max-width: 520px;
    }

    .guide-item {
      text-align: center;
      padding: 14px 10px 12px;
      border-radius: 16px;
      background: linear-gradient(145deg, rgba(36, 40, 59, 0.95), rgba(26, 27, 38, 0.98));
      border: 1px solid rgba(65, 72, 104, 0.9);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.55);
      transition: transform 0.12s ease-out, box-shadow 0.12s ease-out, border-color 0.12s ease-out;
      text-decoration: none;
    }

    .guide-item:active {
      transform: scale(0.96);
    }

    .guide-item img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      border-radius: 14px;
      margin-bottom: 8px;
    }

    .guide-item-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
    }

    .footer {
      display: block;
      margin: -20px;
      margin-bottom: -23px;
      width: calc(100% + 40px);
      border-radius: 18px;
    }

    @media (hover: hover) {
      .btn-telegram:hover {
        transform: translateY(-1px);
        box-shadow: 0 14px 30px rgba(34, 158, 217, 0.6), 0 0 0 1px rgba(34, 158, 217, 0.4);
        background: radial-gradient(circle at 0 0, rgba(42, 195, 222, 0.5), rgba(26, 27, 38, 1));
      }

      .guide-item:hover {
        transform: translateY(-3px);
        box-shadow: 0 16px 32px rgba(0, 0, 0, 0.7);
        border-color: rgba(122, 162, 247, 0.9);
      }
    }

    @media (max-width: 640px) {
      .card {
        padding: 18px 14px 22px;
      }

      .title-main {
        font-size: 26px;
      }

      .guides-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .footer {
        margin-left: -14px;
        margin-right: -14px;
        margin-top: -18px;
        margin-bottom: -25px;
        width: calc(100% + 28px);
      }
    }

    @media (max-width: 420px) {
      .guides-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card center">
      <a href="https://t.me/geoveepn">
        <img src="https://readme-typing-svg.demolab.com?font=Fira+Code&duration=1000&pause=1000&center=true&width=435&lines=%D0%B4%D0%BE%D1%81%D1%82%D1%83%D0%BF+%D0%BA+chatgpt%2C+telegram%2C+youtube;%D1%81%D1%82%D0%B0%D0%B1%D0%B8%D0%BB%D1%8C%D0%BD%D0%BE+%D0%BD%D0%B8%D0%B7%D0%BA%D0%B8%D0%B9+%D0%BF%D0%B8%D0%BD%D0%B3;%D0%B1%D0%B5%D1%81%D0%BF%D0%BB%D0%B0%D1%82%D0%BD%D0%BE+5+%D0%B3%D0%B1;%D0%BF%D0%BE%D0%B4%D0%BA%D0%BB%D1%8E%D1%87%D0%B5%D0%BD%D0%B8%D0%B5+%D1%81+%D0%BB%D1%8E%D0%B1%D0%BE%D0%B3%D0%BE+%D1%83%D1%81%D1%82%D1%80%D0%BE%D0%B9%D1%81%D1%82%D0%B2%D0%B0" alt="GeoVPN преимущества">
      </a>

      <div>
        <a href="https://t.me/geoveepn">
          <img src="https://github.com/user-attachments/assets/778c6eec-e1ff-4eb1-aef5-e6aa1b91301e" alt="Logo">
        </a>
      </div>

      <h1 class="title-main">GeoVPN</h1>
      <p class="subtitle">Доступ к ChatGPT, Telegram, YouTube и другим сервисам с низким пингом и удобным подключением.</p>

      <a href="https://t.me/geoveepn" class="btn-telegram">
        <span>Открыть в Telegram</span>
      </a>

      <div class="badge-row">
        <div class="badge">Бесплатно 5 ГБ</div>
        <div class="badge">Низкий пинг</div>
        <div class="badge">Любые устройства</div>
      </div>
    </div>

    <div class="card" style="padding-top: 15px;">
      <div class="center">
        <div class="typing-banner">Гайды</div>
      </div>

      <div class="guides-grid">
        <a href="https://github.com/geoveepn/geoveepn.github.io/blob/main/src/android/android.md" class="guide-item">
          <img src="https://github.com/user-attachments/assets/e6eeaeef-0bf3-43a7-8598-f2accb6d0fb8" alt="Android">
          <div class="guide-item-title">Android</div>
        </a>
        <a href="https://github.com/geoveepn/geoveepn.github.io/blob/main/src/windows/windows.md" class="guide-item">
          <img src="https://github.com/user-attachments/assets/dca21132-8674-4300-aab1-16fefc314f13" alt="Windows">
          <div class="guide-item-title">Windows</div>
        </a>
        <a href="https://github.com/geoveepn/geoveepn.github.io/blob/main/src/ios/ios.md" class="guide-item">
          <img src="https://github.com/user-attachments/assets/53dd7339-5e4e-49b4-9ef7-3ec60b84e8ca" alt="iOS">
          <div class="guide-item-title">iOS</div>
        </a>
      </div>

      <img class="footer" src="/src/img/footbg.png" alt="GeoVPN footer">
    </div>
  </div>
</body>
</html>
